name: Update flake.lock

on:
  workflow_dispatch:
  schedule:
    # every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - flake-dir: "."
            slug: "root"
          - flake-dir: "home-manager-only"
            slug: "home-manager-only"
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@main
        with:
          path-to-flake-dir: ${{ matrix.flake-dir }}
          pr-title: "Update flake.lock (${{ matrix.slug }})"
          branch: "update-flake-lock-${{ matrix.slug }}"
          pr-labels: |
            dependencies
            automated
